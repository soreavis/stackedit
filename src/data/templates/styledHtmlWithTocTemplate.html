<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{files.0.name}}</title>
  <link rel="stylesheet" href="https://stackedit.io/style.css" />
  {{#if pdf}}
  <style>
    /* Keep diagrams intact. Nothing else overridden — stacking "avoid"
       break-after on every heading and break-before on every mermaid
       wrapper forced Chromium to leave huge blank slabs when the target
       page couldn't fit the grouped content. */
    .stackedit--pdf .mermaid-wrapper,
    .stackedit--pdf pre.mermaid,
    .stackedit--pdf .mermaid {
      page-break-inside: avoid;
      break-inside: avoid;
      text-align: center;
    }
    .stackedit--pdf .mermaid-wrapper svg,
    .stackedit--pdf pre.mermaid svg,
    .stackedit--pdf .mermaid svg {
      max-width: 100% !important;
      max-height: 90vh !important;
      height: auto !important;
      width: auto !important;
    }
  </style>
  {{/if}}
</head>

{{#if pdf}}
<body class="stackedit stackedit--pdf">
{{else}}
<body class="stackedit">
{{/if}}
  <div class="stackedit__left">
    <div class="stackedit__toc">
      {{#tocToHtml files.0.content.toc 2}}{{/tocToHtml}}
    </div>
  </div>
  <div class="stackedit__right">
    <div class="stackedit__html">
      {{{files.0.content.html}}}
    </div>
  </div>
</body>

</html>
