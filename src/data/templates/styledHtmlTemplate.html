<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{files.0.name}}</title>
  <link rel="stylesheet" href="https://stackedit.io/style.css" />
  <style>
    .stackedit .mermaid-wrapper,
    .stackedit pre.mermaid,
    .stackedit .mermaid {
      text-align: center;
    }
    .stackedit .mermaid-wrapper > svg,
    .stackedit pre.mermaid > svg,
    .stackedit .mermaid > svg {
      display: inline-block;
      max-width: 100%;
    }
    /* Content-driven column sizing for tables. Upstream `style.css`
       sets `table-layout: fixed`, which gives every column the same
       width regardless of content — short values like "Founded" or
       "Signal" end up consuming as much horizontal space as a 30-word
       prose cell, and that prose then wraps to many lines. `auto`
       lets the browser measure each column's natural content and
       distribute width proportionally. `word-break: break-word` keeps
       very long unbreakable tokens (URLs, hashes) from blowing out
       the layout, and `vertical-align: top` keeps short cells
       aligned to the top edge of taller neighbours. */
    /* `table-layout: auto` lets the browser measure each column's
       content and distribute width proportionally — the wide prose
       column ("Value", "Why") gets the lion's share and short-content
       columns ("Metric", "Signal", "Pressure Level") shrink to fit
       their longest word. Crucially we DON'T set any kind of
       `overflow-wrap` / `word-break` here — those values reduce
       each column's min-content-width to a single character (because
       the algorithm now knows it could break words to satisfy
       compression), and auto-layout then collapses narrow columns
       letter-by-letter to give the prose column more room. With the
       defaults, min-content-width is the widest unbreakable word, so
       "Pressure" / "Founded" / "Coevera" stay on one line. */
    .stackedit__html table {
      table-layout: auto;
      width: 100%;
    }
    .stackedit__html th,
    .stackedit__html td {
      vertical-align: top;
    }
    /* Safety net for genuinely-pathological tokens (very long URLs,
       hashes, base64) that no column can fit even at its widest:
       break-all-style fallback only on inline tokens that are obviously
       URL-shaped or 50+ chars long would be ideal, but CSS can't
       conditionally apply that. Instead we apply a soft hyphen to
       *anywhere* via `overflow-wrap: anywhere` only when the cell
       would otherwise overflow horizontally — but auto-layout will
       expand the column up to the table's max-width before resorting
       to that, so it kicks in rarely. */
    .stackedit__html td a,
    .stackedit__html td code {
      overflow-wrap: anywhere;
    }
  </style>
  {{#if pdf}}
  <style>
    /* Keep diagrams intact. Nothing else overridden — stacking "avoid"
       break-after on every heading and break-before on every mermaid
       wrapper was forcing Chromium to leave huge blank slabs when the
       target page couldn't fit the grouped content. Occasional split
       between heading and diagram is the lesser evil. */
    .stackedit--pdf .mermaid-wrapper,
    .stackedit--pdf pre.mermaid,
    .stackedit--pdf .mermaid {
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .stackedit--pdf .mermaid-wrapper svg,
    .stackedit--pdf pre.mermaid svg,
    .stackedit--pdf .mermaid svg {
      max-width: 100% !important;
      max-height: 90vh !important;
      height: auto !important;
      width: auto !important;
    }
  </style>
  {{/if}}
</head>

{{#if pdf}}
<body class="stackedit stackedit--pdf">
{{else}}
<body class="stackedit">
{{/if}}
  <div class="stackedit__html">{{{files.0.content.html}}}</div>
</body>

</html>
